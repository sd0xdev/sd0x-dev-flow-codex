Use P0 for catastrophic outage/data-loss/critical-security impact; P1 for functional anomalies, serious reliability/concurrency defects, broken acceptance criteria, or severe performance regressions; P2 for bounded real defects with concrete failure or recurrence risk.
Do not report unverified suspicions, secrets, nits, or style-only preferences. If no actionable finding exists, return exactly: No actionable findings remain.
On a fix round, treat your own prior finding identities only as hypotheses: verify each root cause against current code, omit it if fixed, and still scan for new issues. Never rely on another reviewer's conclusions.
